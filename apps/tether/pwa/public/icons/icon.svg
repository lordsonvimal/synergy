<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1120"/>
      <stop offset="100%" stop-color="#141D2E"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Terminal window -->
  <rect x="172" y="192" width="680" height="560" rx="36" fill="#1C2841" stroke="#2D3B50" stroke-width="3"/>

  <!-- Title bar background -->
  <rect x="172" y="192" width="680" height="60" rx="36" fill="#1C2841"/>
  <rect x="172" y="224" width="680" height="28" fill="#1C2841"/>

  <!-- Title bar dots -->
  <circle cx="216" cy="222" r="11" fill="#ff4757" opacity="0.85"/>
  <circle cx="254" cy="222" r="11" fill="#ffa502" opacity="0.85"/>
  <circle cx="292" cy="222" r="11" fill="#2ed573" opacity="0.85"/>

  <!-- Terminal content area -->
  <rect x="172" y="252" width="680" height="500" fill="#0f1117"/>
  <rect x="172" y="716" width="680" height="36" rx="36" fill="#0f1117"/>

  <!-- Prompt chevron -->
  <text x="212" y="330" font-family="'Courier New', monospace" font-size="48" font-weight="700" fill="#60A5FA">❯</text>

  <!-- Blinking cursor -->
  <rect x="268" y="296" width="24" height="44" rx="3" fill="#60A5FA" opacity="0.8"/>

  <!-- Chain/tether link — centered in terminal body -->
  <g transform="translate(512, 520)" stroke="url(#glow)" stroke-width="24" stroke-linecap="round" fill="none">
    <!-- Upper link -->
    <rect x="-52" y="-130" width="104" height="148" rx="52" transform="rotate(-30, 0, -56)"/>
    <!-- Lower link -->
    <rect x="-52" y="-18" width="104" height="148" rx="52" transform="rotate(-30, 0, 56)"/>
  </g>
</svg>
